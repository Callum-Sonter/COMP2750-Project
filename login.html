<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/styles.css" rel="stylesheet">
</head>
<body class="login-shell">
  <main class="app-shell d-flex align-items-center py-5">
    <div class="container">
      <section class="login-panel card border-0 shadow-sm mx-auto">
        <div class="bg-danger text-white px-4 py-3">
          <div class="d-flex align-items-center gap-3">
            <div>
              <h1 class="h3 mb-0 fw-bold">MQ Marketplace</h1>
              <p class="mb-0 opacity-75">Campus trading for Macquarie students</p>
            </div>
          </div>
        </div>
        <div class="card-body p-4 p-md-5">
          <h2 class="h4 fw-bold mb-2">Sign in</h2>
          <p class="text-muted mb-4">Use your Firebase test account to continue.</p>

          <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>

          <form id="loginForm">
            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input id="email" name="email" type="email" class="form-control" autocomplete="email" required>
            </div>
            <div class="mb-4">
              <label for="password" class="form-label">Password</label>
              <input id="password" name="password" type="password" class="form-control" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Sign In</button>
          </form>
        </div>
      </section>
    </div>
  </main>
  
  <script type="module" src="js/login.js"></script>
</body>
</html>
