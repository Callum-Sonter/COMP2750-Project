<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Listings | Campus Marketplace</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="styles.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <header class="page-header">
    <nav class="container-fluid px-4 py-3 d-flex justify-content-between align-items-center">
      <a class="text-decoration-none" href="index.html">
        <span class="brand-title display-6 fw-bold mb-0">MQ Marketplace</span>
      </a>
      <div class="d-flex align-items-center gap-3">
        <span class="text-white small" data-user-email></span>
        <button class="btn btn-outline-danger" data-sign-out>Sign Out</button>
      </div>
    </nav>
  </header>

  <!-- Navigation -->
  <div class="section-tabs">
    <div class="container-fluid px-4">
      <ul class="nav">
        <li class="nav-item"><a class="nav-link" href="marketplace.html">Browse</a></li>
        <li class="nav-item"><a class="nav-link active" href="mylistings.html">My Listings</a></li>
        <li class="nav-item"><a class="nav-link" href="shortlist.html">My Shortlist</a></li>
      </ul>
    </div>
  </div>

  <!-- Main content -->
  <main class="container-fluid px-4 py-4">
    <h2 class="mb-1">My Listings</h2>
    <p class="text-muted mb-4" id="listing-count">Loading...</p>

    <!-- Loading spinner -->
    <div id="loading-spinner" class="text-center py-5">
      <div class="spinner-border text-danger" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="text-center py-5 d-none">
      <p class="text-muted">You have no listings yet.</p>
    </div>

    <!-- Cards grid -->
    <div id="listings-grid" class="row g-4"></div>
  </main>

  <script type="module" src="mylistings.js"></script>
</body>
</html>
